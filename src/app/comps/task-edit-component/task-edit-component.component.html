<div *ngIf="task">
  <h5>Edit Task</h5>

  <form (ngSubmit)="updateTask()">

    <input [(ngModel)]="task.title" name="title" class="form-control mb-2" required>

    <textarea [(ngModel)]="task.description" name="description" class="form-control mb-2"></textarea>

    <input type="date" [(ngModel)]="task.dueDate" name="dueDate" class="form-control mb-2">

    <select [(ngModel)]="task.status" name="status" class="form-select mb-2">
      <option>Pending</option>
      <option>In Progress</option>
      <option>Completed</option>
    </select>

    <select [(ngModel)]="task.priority" name="priority" class="form-select mb-2">
      <option>Low</option>
      <option>Medium</option>
      <option>High</option>
    </select>

    <button class="btn btn-primary">Save</button>
  </form>
</div>
